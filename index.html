<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Card Pre-Grader</title>
    <style>
        body { margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; background-color: #121212; min-height: 100vh; color: #FFF; font-family: sans-serif; }
        h2 { font-size: 22px; font-weight: bold; margin-bottom: 20px; text-align: center; }
        .upload-container { width: 320px; background-color: #1E1E1E; padding: 20px; border-radius: 15px; box-sizing: border-box; text-align: center; border: 2px dashed #555; }
        #fileInput { display: none; }
        .custom-button { background-color: #FF0055; color: #FFF; border: none; padding: 15px 30px; border-radius: 30px; font-size: 16px; font-weight: bold; cursor: pointer; display: inline-block; margin-top: 10px; }
        #scanButton { background-color: #00FFCC; color: #121212; display: none; margin-top: 20px; }
        #scanButton:disabled { background-color: #555; color: #AAA; }
        #preview { width: 100%; max-height: 300px; object-fit: contain; margin-top: 15px; display: none; border-radius: 10px; }
        #resultsPanel { margin-top: 20px; padding: 15px; background-color: #2a2a2a; border-radius: 10px; width: 320px; box-sizing: border-box; }
        .resultLine { color: #AAA; font-size: 16px; margin: 0 0 5px 0; }
        #verdictText { color: #00FFCC; font-size: 16px; font-weight: bold; margin: 5px 0 0 0; }
    </style>
</head>
<body>

    <h2>Pokémon Card Pre-Grader</h2>
    
    <div class="upload-container">
        <p style="margin-top:0; color:#AAA;">Select a card photo from your library or take a fresh picture:</p>
        
        <label for="fileInput" class="custom-button">Choose / Take Photo</label>
        <input type="file" id="fileInput" accept="image/*">
        
        <img id="preview" alt="Card Preview">
        <button id="scanButton" class="custom-button">Analyze Uploaded Card</button>
    </div>

    <div id="resultsPanel" style="display: none;">
        <p class="resultLine" id="lrLine">L/R Centering: </p>
        <p class="resultLine" id="tbLine">T/B Centering: </p>
        <p id="verdictText">Verdict: </p>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const preview = document.getElementById('preview');
        const scanButton = document.getElementById('scanButton');
        const resultsPanel = document.getElementById('resultsPanel');
        const lrLine = document.getElementById('lrLine');
        const tbLine = document.getElementById('tbLine');
        const verdictText = document.getElementById('verdictText');

        // Show image preview when user selects or takes a photo
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                preview.src = URL.createObjectURL(file);
                preview.style.display = 'block';
                scanButton.style.display = 'inline-block';
                resultsPanel.style.display = 'none';
            }
        });

        scanButton.addEventListener('click', async () => {
            const file = fileInput.files[0];
            if (!file) return;

            scanButton.disabled = true;
            scanButton.innerText = "Analyzing Centering...";

            let dataForm = new FormData();
            dataForm.append('file', file);

            try {
                const response = await fetch('https://grading-api-xpcf.onrender.com/analyze', {
                    method: 'POST',
                    body: dataForm
                });

                if (!response.ok) throw new Error("Server communication breakdown");

                const jsonOutput = await response.json();
                
                lrLine.innerText = `L/R Centering: ${jsonOutput.left_right_ratio || 'N/A'}`;
                tbLine.innerText = `T/B Centering: ${jsonOutput.top_bottom_ratio || 'N/A'}`;
                verdictText.innerText = `Verdict: ${jsonOutput.verdict || 'Error'}`;
                resultsPanel.style.display = 'block';

            } catch (error) {
                alert("Upload failed. Your internet browser cut the data stream.");
            } finally {
                scanButton.disabled = false;
                scanButton.innerText = "Analyze Uploaded Card";
            }
        });
    </script>
</body>
</html>
