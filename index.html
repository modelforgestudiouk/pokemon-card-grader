<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Model Forge Studio - Elite Pre-Grader</title>
    <style>
        :root { --bg-dark: #0A0A0C; --panel-dark: #141417; --brand-orange: #FF5500; --brand-white: #FFFFFF; --text-gray: #A6A6A6; --success-green: #00FFCC; --alert-red: #FF3333; --binder-color: #1A365D; }
        body { margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; background-color: var(--bg-dark); min-height: 100vh; color: var(--brand-white); font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        .header-container { display: flex; align-items: center; justify-content: space-between; width: 350px; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #222; }
        .logo-badge { background-color: var(--brand-orange); color: var(--bg-dark); font-weight: 900; font-size: 20px; padding: 5px 12px; border-radius: 8px; margin-right: 12px; }
        .logo-flex { display: flex; align-items: center; }
        .logo-text { font-size: 20px; font-weight: 900; letter-spacing: 1px; color: var(--brand-orange); margin: 0; text-transform: uppercase; }
        .logo-sub { font-size: 11px; color: var(--brand-white); font-weight: 300; letter-spacing: 2px; text-transform: uppercase; margin-top: -2px; }
        .utility-box { display: flex; gap: 8px; align-items: center; }
        .help-btn { background: none; border: 2px solid var(--brand-orange); color: var(--brand-orange); width: 28px; height: 28px; border-radius: 50%; font-size: 16px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .app-mode-bar { display: flex; width: 350px; gap: 10px; margin-bottom: 15px; }
        .mode-btn { flex: 1; padding: 12px; background-color: #111; border: 1px solid #222; color: var(--text-gray); font-weight: bold; font-size: 13px; border-radius: 8px; cursor: pointer; text-transform: uppercase; }
        .mode-btn.active { background-color: var(--panel-dark); border-color: var(--brand-orange); color: var(--brand-orange); }
        .view-section { width: 350px; display: none; }
        .view-section.active { display: block; }
        .main-panel { width: 100%; background-color: var(--panel-dark); padding: 15px; border-radius: 15px; border: 1px solid #222; margin-bottom: 20px; }
        .custom-button { background-color: var(--brand-orange); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; text-transform: uppercase; margin-top: 10px; }
        .search-input { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #333; background: #000; color: white; box-sizing: border-box; }
        .binder-sheet { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .pocket { aspect-ratio: 2.5/3.5; background: #1a1a1c; border: 1px solid #333; border-radius: 4px; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
    </style>
</head>
<body>
    <div class="header-container">
        <div class="logo-flex"><div class="logo-badge">MF</div><div><div class="logo-text">Model Forge</div><div class="logo-sub">Studio Pre-Grader</div></div></div>
        <div class="utility-box"><button class="help-btn" id="openHelp">?</button></div>
    </div>
    <div class="app-mode-bar">
        <button class="mode-btn active" id="navScanner">Scanner</button>
        <button class="mode-btn" id="navBinder">Binder</button>
    </div>
    
    <div id="viewScanner" class="view-section active">
        <div class="main-panel">
            <button id="calcBtn" class="custom-button">📊 Show Potential Grades</button>
            <div id="results" style="display:none; margin-top:15px;">
                <p>PSA Predicted: <span id="psaVal">Gem Mint 10</span></p>
                <button id="saveBtn" class="custom-button" style="background:#0056B3;">➕ Lock Into Binder</button>
            </div>
        </div>
        <div class="main-panel">
            <input type="text" id="searchInput" class="search-input" placeholder="Search Card">
            <button id="findBtn" class="custom-button" style="background:#444;">Find</button>
            <p id="priceVal"></p>
        </div>
    </div>

    <div id="viewBinder" class="view-section">
        <div class="main-panel">
            <div id="binderGrid" class="binder-sheet"></div>
        </div>
    </div>

    <div id="helpModal" class="modal-overlay"><div class="modal-card"><h3>Manual Guide</h3><p>Use the buttons to grade and save.</p><button id="closeHelp" class="custom-button">Got It</button></div></div>

    <script type="module">
        // Direct event handlers - No background loops
        document.getElementById('calcBtn').onclick = () => document.getElementById('results').style.display = 'block';
        document.getElementById('findBtn').onclick = () => document.getElementById('priceVal').innerText = "Price: £1.25";
        document.getElementById('openHelp').onclick = () => document.getElementById('helpModal').classList.add('active');
        document.getElementById('closeHelp').onclick = () => document.getElementById('helpModal').classList.remove('active');
        
        document.getElementById('navScanner').onclick = () => { document.getElementById('viewScanner').classList.add('active'); document.getElementById('viewBinder').classList.remove('active'); };
        document.getElementById('navBinder').onclick = () => { document.getElementById('viewBinder').classList.add('active'); document.getElementById('viewScanner').classList.remove('active'); };
    </script>
</body>
</html>
