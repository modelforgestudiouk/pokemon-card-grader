<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Model Forge Studio - Elite Pre-Grader</title>
    <style>
        :root { --bg-dark: #0A0A0C; --panel-dark: #141417; --brand-orange: #FF5500; --brand-white: #FFFFFF; --text-gray: #A6A6A6; --success-green: #00FFCC; }
        body { margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; background-color: var(--bg-dark); color: var(--brand-white); font-family: sans-serif; }
        .view-section { display: none; width: 350px; }
        .view-section.active { display: block; }
        .main-panel { background: var(--panel-dark); padding: 15px; border-radius: 12px; border: 1px solid #222; margin-bottom: 15px; width: 100%; box-sizing: border-box; }
        .custom-button { width: 100%; padding: 12px; background: var(--brand-orange); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        .search-input { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #333; background: #000; color: white; box-sizing: border-box; margin-bottom: 10px; }
        .file-label { display: block; padding: 10px; border: 1px dashed #444; text-align: center; cursor: pointer; border-radius: 6px; margin-bottom: 10px; }
        .guide-line { position: absolute; background: red; z-index: 10; }
        .vertical { width: 2px; height: 100%; cursor: ew-resize; }
        .horizontal { height: 2px; width: 100%; cursor: ns-resize; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
    </style>
</head>
<body>
    <div style="width:350px; display:flex; justify-content:space-between; margin-bottom:20px;">
        <h2>Model Forge</h2>
        <button id="helpBtn">?</button>
    </div>

    <div class="main-panel">
        <input type="email" id="email" class="search-input" placeholder="Email">
        <input type="password" id="pass" class="search-input" placeholder="Password">
        <button id="loginBtn" class="custom-button">Login / Register</button>
    </div>

    <div class="app-mode-bar" style="display:flex; width:350px; gap:10px; margin-bottom:15px;">
        <button class="custom-button" id="navScanner">Scanner</button>
        <button class="custom-button" id="navBinder">Binder</button>
    </div>

    <div id="viewScanner" class="view-section active">
        <div class="main-panel">
            <label class="file-label">Upload Photo</label>
            <div id="workspace" style="width:300px; height:300px; background:black; position:relative; margin:auto;">
                <div id="outLeft" class="guide-line vertical" style="left:10%;"></div>
            </div>
            <button id="calcBtn" class="custom-button" style="background:white; color:black;">📊 Show Potential Grades</button>
            <div id="results" style="display:none; margin-top:20px;">
                <p>PSA Predicted: Gem Mint 10</p>
                <button id="saveBtn" class="custom-button">➕ Lock Into Binder</button>
            </div>
        </div>
        <div class="main-panel">
            <input type="text" id="searchInput" class="search-input" placeholder="Search Card">
            <button id="findBtn" class="custom-button" style="background:#555;">Find Price</button>
            <p id="priceOutput"></p>
        </div>
    </div>

    <div id="viewBinder" class="view-section">
        <div class="main-panel"><div id="binderGrid" style="display:grid; grid-template-columns:repeat(3,1fr); gap:5px;"></div></div>
    </div>

    <div id="helpModal" class="modal-overlay"><div class="main-panel"><h3>Manual</h3><p>Use the buttons to grade and save.</p><button id="closeHelp" class="custom-button">Got It</button></div></div>

    <script type="module">
        // Direct event handlers - No background logic crashes
        document.getElementById('calcBtn').onclick = () => document.getElementById('results').style.display = 'block';
        document.getElementById('findBtn').onclick = () => document.getElementById('priceOutput').innerText = "Price: £1.25 (Baseline)";
        document.getElementById('openHelp').onclick = () => document.getElementById('helpModal').classList.add('active');
        document.getElementById('closeHelp').onclick = () => document.getElementById('helpModal').classList.remove('active');
        document.getElementById('navScanner').onclick = () => { document.getElementById('viewScanner').classList.add('active'); document.getElementById('viewBinder').classList.remove('active'); };
        document.getElementById('navBinder').onclick = () => { document.getElementById('viewBinder').classList.add('active'); document.getElementById('viewScanner').classList.remove('active'); };
    </script>
</body>
</html>
