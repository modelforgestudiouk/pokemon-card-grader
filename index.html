<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Model Forge Studio - Elite Pre-Grader</title>
    <style>
        :root { --bg-dark: #0A0A0C; --panel-dark: #141417; --brand-orange: #FF5500; --brand-white: #FFFFFF; --text-gray: #A6A6A6; --success-green: #00FFCC; --alert-red: #FF3333; --binder-color: #1A365D; }
        body { margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; background-color: var(--bg-dark); min-height: 100vh; color: var(--brand-white); font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        
        .app-mode-bar { display: flex; width: 350px; gap: 10px; margin-bottom: 15px; }
        .view-section { display: none; width: 350px; }
        .view-section.active { display: block; }
        .main-panel { background: var(--panel-dark); padding: 15px; border-radius: 12px; border: 1px solid #222; margin-bottom: 15px; width: 100%; box-sizing: border-box; }
        .custom-button { width: 100%; padding: 12px; background: var(--brand-orange); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        .search-input { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #333; background: #000; color: white; box-sizing: border-box; margin-bottom: 10px; }
        
        .binder-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; height: 420px; }
        .pocket { aspect-ratio: 2.5/3.5; background: #1a1a1c; border: 1px solid #333; border-radius: 4px; display: flex; align-items: center; justify-content: center; color: #333; font-weight: bold; }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 100; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: var(--panel-dark); padding: 20px; border-radius: 15px; width: 300px; border: 2px solid var(--brand-orange); }

        #workspace { position: relative; width: 300px; height: 300px; background: black; margin: 10px auto; border: 1px solid #333; }
        .guide-line { position: absolute; background: red; z-index: 10; }
    </style>
</head>
<body>
    <div class="app-mode-bar">
        <button class="custom-button" id="navScanner">Scanner</button>
        <button class="custom-button" id="navBinder">Binder</button>
    </div>
    
    <div id="viewScanner" class="view-section active">
        <div class="main-panel">
            <button id="calcBtn" class="custom-button">📊 Show Potential Grades</button>
            <div id="results" style="display:none; margin-top:15px;">
                <p>PSA Predicted: <span id="psa">Gem Mint 10</span></p>
                <button id="saveBtn" class="custom-button" style="background:#0056B3;">➕ Lock Into Binder</button>
            </div>
        </div>
        <div class="main-panel">
            <input type="text" id="searchInput" class="search-input" placeholder="Card Name">
            <button id="findBtn" class="custom-button" style="background:#444;">Find Price</button>
            <p id="priceOutput"></p>
        </div>
    </div>

    <div id="viewBinder" class="view-section">
        <div class="main-panel">
            <div id="binderGrid" class="binder-grid"></div>
        </div>
    </div>

    <div id="helpModal" class="modal-overlay"><div class="modal-content"><h3>Manual</h3><p>Use the buttons to grade and save.</p><button id="closeHelp" class="custom-button">Got It</button></div></div>

    <script type="module">
        // Direct event handlers - These bypass any async lag
        document.getElementById('calcBtn').onclick = () => {
            document.getElementById('results').style.display = 'block';
        };

        document.getElementById('findBtn').onclick = () => {
            const val = document.getElementById('searchInput').value;
            document.getElementById('priceOutput').innerText = val ? `Price for ${val}: £1.25` : "Enter a name first";
        };

        document.getElementById('navScanner').onclick = () => { 
            document.getElementById('viewScanner').classList.add('active'); 
            document.getElementById('viewBinder').classList.remove('active'); 
        };
        document.getElementById('navBinder').onclick = () => { 
            document.getElementById('viewBinder').classList.add('active'); 
            document.getElementById('viewScanner').classList.remove('active'); 
        };

        // Render binder
        const grid = document.getElementById('binderGrid');
        for(let i=0; i<9; i++) {
            const div = document.createElement('div');
            div.className = 'pocket';
            div.innerText = '×';
            grid.appendChild(div);
        }
    </script>
</body>
</html>
