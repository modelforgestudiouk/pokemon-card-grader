<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Model Forge Studio - Precision Pre-Grader</title>
    <style>
        :root {
            --bg-dark: #0D0D0D;
            --panel-dark: #1A1A1A;
            --brand-orange: #FF5500;
            --brand-white: #FFFFFF;
            --text-gray: #A6A6A6;
            --success-green: #00FFCC;
        }

        body { margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; background-color: var(--bg-dark); min-height: 100vh; color: var(--brand-white); font-family: sans-serif; }
        
        .header-container { display: flex; align-items: center; justify-content: space-between; width: 340px; margin-bottom: 20px; position: relative; }
        .logo-badge { background-color: var(--brand-orange); color: var(--bg-dark); font-weight: 900; font-size: 20px; padding: 5px 12px; border-radius: 8px; margin-right: 12px; letter-spacing: -1px; }
        .logo-flex { display: flex; align-items: center; }
        .logo-text { font-size: 20px; font-weight: 900; letter-spacing: 1px; color: var(--brand-orange); margin: 0; text-transform: uppercase; }
        .logo-sub { font-size: 11px; color: var(--brand-white); font-weight: 300; letter-spacing: 2px; text-transform: uppercase; margin-top: -2px; }
        
        .help-btn { background: none; border: 2px solid var(--brand-orange); color: var(--brand-orange); width: 28px; height: 28px; border-radius: 50%; font-size: 16px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        .upload-container { width: 340px; background-color: var(--panel-dark); padding: 15px; border-radius: 15px; box-sizing: border-box; text-align: center; border: 1px solid #2B2B2B; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 15px; }
        #fileInput { display: none; }
        
        .custom-button { background-color: var(--brand-orange); color: var(--brand-white); border: none; padding: 12px 25px; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; display: inline-block; margin: 10px 0; width: 100%; box-sizing: border-box; text-transform: uppercase; letter-spacing: 1px; text-decoration: none; text-align: center; }
        #calculateButton { background-color: var(--brand-white); color: var(--bg-dark); display: none; margin-top: 15px; }
        
        #controlDock { display: none; justify-content: space-between; margin-top: 10px; background: #222; padding: 8px; border-radius: 8px; }
        .dock-btn { background: none; border: 1px solid var(--brand-orange); color: var(--brand-white); padding: 6px 12px; border-radius: 5px; font-size: 12px; font-weight: bold; cursor: pointer; }

        #workspace { position: relative; width: 310px; height: 430px; margin: 15px auto; display: none; background-color: #000; border-radius: 8px; overflow: hidden; border: 1px solid #333; }
        #imageContainer { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; transform-origin: center center; }
        #previewImage { max-width: 100%; max-height: 100%; object-fit: contain; pointer-events: none; }
        
        /* Crosshairs Layout */
        .guide-line { position: absolute; z-index: 10; opacity: 0.9; }
        .vertical { width: 2px; height: 100%; top: 0; cursor: ew-resize; }
        .horizontal { height: 2px; width: 100%; left: 0; cursor: ns-resize; }
        
        .outer-line { background-color: #FF2222; }
        .outer-line.vertical::after { content: ''; position: absolute; left: -11px; top: 50%; width: 24px; height: 24px; background: #FF2222; border: 2px solid #FFF; border-radius: 50%; transform: translateY(-50%); }
        .outer-line.horizontal::after { content: ''; position: absolute; top: -11px; left: 50%; width: 24px; height: 24px; background: #FF2222; border: 2px solid #FFF; border-radius: 50%; transform: translateX(-50%); }

        .inner-line { background-color: var(--success-green); }
        #inLeft.vertical::after { content: ''; position: absolute; left: -11px; top: 35%; width: 24px; height: 24px; background: var(--success-green); border: 2px solid #FFF; border-radius: 50%; transform: translateY(-50%); }
        #inRight.vertical::after { content: ''; position: absolute; left: -11px; top: 65%; width: 24px; height: 24px; background: var(--success-green); border: 2px solid #FFF; border-radius: 50%; transform: translateY(-50%); }
        #inTop.horizontal::after { content: ''; position: absolute; top: -11px; left: 35%; width: 24px; height: 24px; background: var(--success-green); border: 2px solid #FFF; border-radius: 50%; transform: translateX(-50%); }
        #inBottom.horizontal::after { content: ''; position: absolute; top: -11px; left: 65%; width: 24px; height: 24px; background: var(--success-green); border: 2px solid #FFF; border-radius: 50%; transform: translateX(-50%); }

        /* Panels System Layout */
        .info-panel { width: 340px; background-color: var(--panel-dark); padding: 15px; border-radius: 15px; box-sizing: border-box; border: 1px solid #2B2B2B; margin-bottom: 15px; }
        .panel-title { font-size: 16px; color: var(--brand-orange); font-weight: bold; margin: 0 0 12px 0; border-bottom: 1px solid #333; padding-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        /* Grading Scores Styles */
        .company-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #252525; font-size: 14px; }
        .company-name { font-weight: bold; color: var(--text-gray); }
        .company-verdict { color: var(--brand-white); font-weight: bold; }
        .perfect { color: var(--success-green) !important; }

        /* Pricing Tool Interface Elements */
        .search-box { display: flex; gap: 8px; margin-top: 5px; }
        .search-input { flex: 1; background-color: #0D0D0D; border: 1px solid #333; border-radius: 6px; padding: 10px; color: #FFF; font-size: 14px; }
        .search-input:focus { border-color: var(--brand-orange); outline: none; }
        .search-btn { background-color: var(--brand-orange); border: none; color: #FFF; font-weight: bold; padding: 0 15px; border-radius: 6px; cursor: pointer; }
        
        #priceResultBox { display: none; margin-top: 15px; background: #222; padding: 12px; border-radius: 8px; text-align: left; }
        .price-line { font-size: 14px; margin: 6px 0; color: var(--brand-white); }
        .price-val { font-weight: bold; color: var(--success-green); }
        #ebayLink { background-color: #0056B3; color: white; font-size: 13px; margin-top: 10px; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-card { background-color: var(--panel-dark); border: 2px solid var(--brand-orange); padding: 25px; border-radius: 15px; width: 290px; color: var(--brand-white); }
        .close-modal { background-color: var(--brand-orange); color: white; border: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; margin-top: 15px; float: right; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header-container">
        <div class="logo-flex">
            <div class="logo-badge">MF</div>
            <div>
                <div class="logo-text">Model Forge</div>
                <div class="logo-sub">Studio Pre-Grader</div>
            </div>
        </div>
        <button class="help-btn" id="openHelp">?</button>
    </div>
    
    <div class="upload-container">
        <label for="fileInput" class="custom-button">Upload Card Image</label>
        <input type="file" id="fileInput" accept="image/*">
        
        <div id="controlDock">
            <button class="dock-btn" id="zoomIn">🔍 Zoom +</button>
            <button class="dock-btn" id="zoomOut">🔍 Zoom -</button>
            <button class="dock-btn" id="rotateLeft">🔄 Tilt L</button>
            <button class="dock-btn" id="rotateRight">🔄 Tilt R</button>
        </div>
        
        <div id="workspace">
            <div id="imageContainer">
                <img id="previewImage" alt="Card Workspace">
            </div>
            
            <div id="outLeft" class="guide-line vertical outer-line" style="left: 10%;"></div>
            <div id="outRight" class="guide-line vertical outer-line" style="left: 90%;"></div>
            <div id="outTop" class="guide-line horizontal outer-line" style="top: 10%;"></div>
            <div id="outBottom" class="guide-line horizontal outer-line" style="top: 90%;"></div>
            
            <div id="inLeft" class="guide-line vertical inner-line" style="left: 20%;"></div>
            <div id="inRight" class="guide-line vertical inner-line" style="left: 80%;"></div>
            <div id="inTop" class="guide-line horizontal inner-line" style="top: 20%;"></div>
            <div id="inBottom" class="guide-line horizontal inner-line" style="top: 80%;"></div>
        </div>
        
        <button id="calculateButton" class="custom-button">Calculate Accurate Ratios</button>
